<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gas Pipeline Map — ArcGIS POC</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.32/esri/themes/dark/main.css" />
  <script src="https://js.arcgis.com/4.32/"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden;
      font-family: "Avenir Next", Helvetica, Arial, sans-serif; }

    .app { display: flex; flex-direction: column; height: 100%; background: #1a1a2e; }

    header {
      flex-shrink: 0; height: 52px; background: #0d1b2a;
      border-bottom: 1px solid #2a4a6b;
      display: flex; align-items: center; padding: 0 20px; gap: 12px;
    }
    header h1 { color: #e8f4fd; font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
    .badge {
      font-size: 11px; color: #7fb3d3; background: #1a3550;
      padding: 2px 8px; border-radius: 12px; border: 1px solid #2a5580;
    }

    #map-container { flex: 1; position: relative; }

    #status {
      display: none; position: absolute; top: 8px; right: 8px;
      background: rgba(13,27,42,0.9); color: #7fb3d3; padding: 5px 12px;
      border-radius: 6px; font-size: 12px; z-index: 10;
      border: 1px solid #2a4a6b;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>US Natural Gas Pipeline Network</h1>
      <span class="badge">EIA Data</span>
      <span class="badge">ArcGIS SDK 4.32</span>
    </header>
    <div id="map-container">
      <div id="status"></div>
    </div>
  </div>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/Basemap",
      "esri/layers/WebTileLayer",
      "esri/layers/FeatureLayer",
      "esri/layers/GeoJSONLayer",
      "esri/widgets/Legend",
      "esri/widgets/ScaleBar",
      "esri/renderers/SimpleRenderer",
      "esri/symbols/SimpleLineSymbol",
      "esri/PopupTemplate"
    ], function(
      Map, MapView, Basemap, WebTileLayer,
      FeatureLayer, GeoJSONLayer,
      Legend, ScaleBar,
      SimpleRenderer, SimpleLineSymbol, PopupTemplate
    ) {

      // Free CARTO dark basemap — no API key needed
      var darkBasemap = new Basemap({
        baseLayers: [new WebTileLayer({
          urlTemplate: "https://{subDomain}.basemaps.cartocdn.com/dark_all/{level}/{col}/{row}.png",
          subDomains: ["a", "b", "c", "d"],
          copyright: "© OpenStreetMap contributors © CARTO"
        })],
        title: "Dark", id: "dark"
      });

      var pipelineRenderer = new SimpleRenderer({
        symbol: new SimpleLineSymbol({
          color: [255, 140, 0, 0.9],
          width: 2.5,
          style: "solid"
        })
      });

      var samplePopup = new PopupTemplate({
        title: "{name}",
        content: "{description}"
      });

      // Always load local GeoJSON first (self-hosted, guaranteed to work)
      var geojsonLayer = new GeoJSONLayer({
        url: "pipelines.geojson",
        title: "Natural Gas Pipelines (Sample)",
        renderer: pipelineRenderer,
        popupTemplate: samplePopup
      });

      var map = new Map({
        basemap: darkBasemap,
        layers: [geojsonLayer]
      });

      var view = new MapView({
        container: "map-container",
        map: map,
        center: [-96.5, 38.5],
        zoom: 4,
        ui: { components: ["attribution"] }
      });

      view.when(function() {
        view.ui.add(new Legend({ view: view, style: { type: "classic", layout: "stack" } }), "bottom-left");
        view.ui.add(new ScaleBar({ view: view, unit: "dual" }), "bottom-right");

        // Attempt to swap in live EIA data after map loads
        var eiaLayer = new FeatureLayer({
          url: "https://services1.arcgis.com/Hp6G80Pky0om7QvQ/arcgis/rest/services/Natural_Gas_Interstate_and_Intrastate_Pipelines/FeatureServer/0",
          title: "Natural Gas Pipelines (EIA)",
          renderer: pipelineRenderer,
          popupTemplate: new PopupTemplate({
            title: "{NAME}",
            content: [{
              type: "fields",
              fieldInfos: [
                { fieldName: "OPERATOR", label: "Operator" },
                { fieldName: "TYPE",     label: "Pipeline Type" },
                { fieldName: "CAPACITY", label: "Capacity (MMCF/D)" },
                { fieldName: "DIAMETER", label: "Diameter (inches)" },
                { fieldName: "STATE",    label: "State(s)" }
              ]
            }]
          }),
          outFields: ["*"]
        });

        eiaLayer.load().then(function() {
          map.remove(geojsonLayer);
          map.add(eiaLayer);
          var s = document.getElementById("status");
          s.textContent = "Live EIA data loaded";
          s.style.display = "block";
          setTimeout(function() { s.style.display = "none"; }, 3000);
        }).catch(function() {
          // Keep the GeoJSON layer — it's already showing
          console.log("EIA service unavailable, showing sample data");
        });
      });
    });
  </script>
</body>
</html>
